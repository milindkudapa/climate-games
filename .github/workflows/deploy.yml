name: Deploy to AWS (S3 + CloudFront)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install v1 dependencies
        run: npm ci --prefix v1

      - name: Install v2 dependencies
        run: npm ci --prefix v2

      - name: Build v1
        run: npm run build --prefix v1

      - name: Build v2
        run: npm run build --prefix v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy v1 to S3
        run: |
          aws s3 sync v1/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/v1/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          aws s3 cp v1/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/v1/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Deploy v2 to S3
        run: |
          aws s3 sync v2/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/v2/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          aws s3 cp v2/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/v2/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/v1/*" "/v2/*"

      - name: Print URLs
        run: |
          DOMAIN=$(aws cloudfront get-distribution \
            --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --query 'Distribution.DomainName' \
            --output text)
          echo "v1: https://$DOMAIN/v1/"
          echo "v2: https://$DOMAIN/v2/"
